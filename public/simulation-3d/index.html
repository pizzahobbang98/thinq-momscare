        let activeQueryMode = 'default'
        let activeRoutineId = null
        let lastDispatchedRoutine = null
        let lastAppliedTimestamp = 0
        let urlBootstrapRoutine = null

        function resolveRoutineId(value) {
          if (!value) return null
          const trimmed = String(value).trim()
          const mapped = HUB_TO_ROUTINE[trimmed] || HUB_TO_ROUTINE[trimmed.toUpperCase()]
          if (mapped && ROUTINE_IDS.has(mapped)) return mapped
          if (ROUTINE_IDS.has(trimmed)) return trimmed
          return null
        }

        function normalizeQueryMode(value) {
          if (!value) return 'default'
          const trimmed = String(value).trim()
          return QUERY_ALIASES[trimmed] || QUERY_ALIASES[trimmed.toUpperCase()] || 'default'
        }

        function dispatchVoiceAgentRoutine(routineId, source) {
          if (!routineId || !ROUTINE_IDS.has(routineId)) {
            console.warn('[simulation-3d bridge] unknown routine:', routineId, source)
            return false
          }

          console.log('[simulation-3d bridge] dispatch voice-agent-routine:', routineId, source || '')

          window.dispatchEvent(
            new CustomEvent('voice-agent-routine', {
              detail: { mode: routineId },
            }),
          )

          lastDispatchedRoutine = routineId
          return true
        }

        function waitForReactRootReady(callback) {
          const root = document.getElementById('root')
          if (root && root.childElementCount > 0) {
            window.setTimeout(callback, 300)
            return
          }

          let done = false
          const finish = () => {
            if (done) return
            done = true
            observer.disconnect()
            window.clearTimeout(fallbackTimer)
            window.setTimeout(callback, 300)
          }

          const observer = new MutationObserver(() => {
            if (root && root.childElementCount > 0) finish()
          })

          if (root) observer.observe(root, { childList: true, subtree: true })

          const fallbackTimer = window.setTimeout(finish, 2500)
        }

        function scheduleRoutineDispatchFast(routineId, source) {
          if (!routineId) return

          const root = document.getElementById('root')
          if (root && root.childElementCount > 0) {
            dispatchVoiceAgentRoutine(routineId, source)
            window.setTimeout(function () {
              dispatchVoiceAgentRoutine(routineId, source + ' (retry)')
            }, 700)
            return
          }

          scheduleRoutineDispatch(routineId, source)
        }

        function scheduleRoutineDispatch(routineId, source) {
          if (!routineId) return

          waitForReactRootReady(() => {
            dispatchVoiceAgentRoutine(routineId, source)
            window.setTimeout(() => {
              dispatchVoiceAgentRoutine(routineId, source + ' (retry)')
            }, 1200)
          })
        }

        function resolveRoutineFromBroadcast(data) {
          if (!data || data.type !== 'THINQ_MOM_MODE') return null

          const hubMode = String(data.mode || '').trim()
          const hubModeUpper = hubMode.toUpperCase()

          if (hubModeUpper === 'HOUSEWORK_MODE') return 'housework_care'
          if (hubModeUpper === 'NAUSEA_MODE') return 'nausea_food'
          if (hubModeUpper === 'SLEEP_MODE') return 'sleep_care'

          if (hubModeUpper === 'TRAVEL_MODE' || hubMode === 'resort' || hubMode === 'travel') {
            const routineFromPayload = resolveRoutineId(data.routineId)
            if (routineFromPayload && routineFromPayload.startsWith('destination_')) {
              return routineFromPayload
            }

            const destinationRoutine = resolveRoutineId(data.travelDestination)
            if (destinationRoutine && destinationRoutine.startsWith('destination_')) {
              return destinationRoutine
            }

            return 'destination_ocean'
          }

          const routineFromPayload = resolveRoutineId(data.routineId)
          if (routineFromPayload) return routineFromPayload

          const routineFromMode = resolveRoutineId(data.mode)
          if (routineFromMode) return routineFromMode

          const destinationRoutine = resolveRoutineId(data.travelDestination)
          if (destinationRoutine) return destinationRoutine

          return null
        }

        function resolveRoutineFromUrlParams(params) {
          const routineParam = resolveRoutineId(params.get('routine'))
          if (routineParam) return routineParam

          const modeParam = String(params.get('mode') || '').trim()
          if (modeParam && MODE_QUERY_TO_ROUTINE[modeParam]) {
            return MODE_QUERY_TO_ROUTINE[modeParam]
          }

          const destinationParam = resolveRoutineId(params.get('destination'))
          if (destinationParam && destinationParam.startsWith('destination_')) {
            return destinationParam
          }

          return resolveRoutineId(modeParam)
        }

        function syncUrlToRoutine(routineId) {
          if (!routineId || !ROUTINE_SCENES[routineId]) return

          const params = new URLSearchParams()
          params.set('routine', routineId)

          const queryMode = ROUTINE_TO_QUERY[routineId]
          if (queryMode) params.set('mode', queryMode)

          const destination = ROUTINE_TO_DESTINATION[routineId]
          if (destination) params.set('destination', destination)

          const nextUrl = window.location.pathname + '?' + params.toString()
          window.history.replaceState(null, '', nextUrl)
          urlBootstrapRoutine = routineId

          console.log('[3D Simulation] URL synced to routine:', {
            routineId,
            queryMode,
            destination: destination || null,
          })
        }

        function shouldApplyIncomingState(source, timestamp) {
          if (
            source === 'url-query' ||
            source === 'test-button' ||
            source === 'postMessage'
          ) {
            return true
          }

          const incomingTimestamp = typeof timestamp === 'number' ? timestamp : Date.now()

          if (incomingTimestamp < lastAppliedTimestamp) {
            console.log('[3D Simulation] ignoring stale state:', {
              source,
              incomingTimestamp,
              lastAppliedTimestamp,
            })
            return false
          }

          return true
        }

        const TRAVEL_DESTINATION_ROUTINES = new Set([
          'destination_ocean',
          'destination_forest',
          'destination_city',
        ])

        function isTravelDestinationRoutine(routineId) {
          return !!routineId && TRAVEL_DESTINATION_ROUTINES.has(routineId)
        }

        function shouldSuppressBridgeMainCaption(routineId, queryMode) {
          if (isTravelDestinationRoutine(routineId)) return true
          return (
            queryMode === 'travel_ocean' ||
            queryMode === 'travel_forest' ||
            queryMode === 'travel_city'
          )
        }

        function markAppliedState(source, timestamp) {
          lastAppliedTimestamp =
            source === 'url-query'
              ? Date.now()
              : typeof timestamp === 'number'
                ? timestamp
                : Date.now()
        }

        function setSceneCaption(mainCaption, subCaption, routineId, queryMode) {
          const mainEl = ensureCaptionMain()
          const subEl = ensureCaptionSub()

          const mainText = mainCaption || subCaption || ''
          const subText = ''

          mainEl.textContent = mainText
          subEl.textContent = subText
          mainEl.style.display = mainText ? 'block' : 'none'
          subEl.style.display = subText ? 'block' : 'none'
        }

        function applySceneVisual(scene, displayLabel, source, routineId) {
          activeQueryMode = scene.queryMode || activeQueryMode
          activeRoutineId = routineId || null

          const badge = ensureBadge()
          const overlay = ensureOverlay()
          const root = document.getElementById('root')

          badge.textContent = ''
          badge.style.display = 'none'
          document.body.dataset.thinqMomMode = activeQueryMode
          document.body.dataset.thinqMomRoutine = routineId || lastDispatchedRoutine || ''

          document.body.style.background = scene.background
          overlay.style.background = scene.overlay
          setSceneCaption(
            scene.mainCaption,
            scene.subCaption,
            routineId || activeRoutineId,
            scene.queryMode || activeQueryMode,
          )

          if (root) root.style.filter = scene.rootFilter

          const suppressMainBox = shouldSuppressBridgeMainCaption(
            routineId || activeRoutineId,
            scene.queryMode || activeQueryMode,
          )

          console.log('[3D Simulation] overlay applied:', {
            queryMode: activeQueryMode,
            routineId: routineId || lastDispatchedRoutine,
            label: displayLabel,
            mainCaption: scene.mainCaption,
            subCaption: scene.subCaption,
            bridgeMainCaptionSuppressed: suppressMainBox,
            source: source || 'unknown',
          })
        }

        function applyThinQMomOverlay(queryMode, labelOverride, source) {
          const normalized = normalizeQueryMode(queryMode)
          const scene = MODE_SCENES[normalized] || MODE_SCENES.default
          const displayLabel = labelOverride || scene.label

          activeQueryMode = normalized
          activeRoutineId = null

          markAppliedState(source, null)
          applySceneVisual(
            {
              ...scene,
              queryMode: normalized,
            },
            displayLabel,
            source,
            null,
          )
        }

        function applyRoutineOverlay(routineId, source, timestamp) {
          if (!routineId || !ROUTINE_SCENES[routineId]) return false

          const scene = ROUTINE_SCENES[routineId]
          activeRoutineId = routineId
          activeQueryMode = scene.queryMode || ROUTINE_TO_QUERY[routineId] || 'default'

          markAppliedState(source, timestamp)
          applySceneVisual(scene, scene.label, source, routineId)
          return true
        }

        function applyRoutineBridge(routineId, source, timestamp) {
          if (!routineId) return

          if (source === 'test-button') {
            persistSimulationTestMode(routineId, source)
          }

          applyRoutineOverlay(routineId, source, timestamp)
          syncUrlToRoutine(routineId)
          scheduleRoutineDispatchFast(routineId, source)

          },
          destination_forest: {
            slug: 'travel_forest',
            hubMode: 'TRAVEL_MODE',
            modeLabel: '휴양지모드 · 숲',
            reason: '숲, 자연, 고요한 휴식과 관련된 표현이 감지됐어요.',
            reply: '숲속처럼 고요한 공기와 화면으로, 마음이 편해지는 공간을 만들어줄게요.',
            wifeCard: '숲속 휴양지처럼 고요하고 편안한 자연 분위기를 준비했어요.',
            husbandCard: '조용히 쉴 수 있도록 주변 소음을 줄여 주세요.',
            signals: ['휴양지', '숲', '자연'],
            simulationScene: 'RESORT_SCENE',
            simulationText: '숲 화면과 차분한 공기 흐름으로 주변 자극을 낮춥니다.',
          },
          destination_city: {
            slug: 'travel_city',
            hubMode: 'TRAVEL_MODE',
            modeLabel: '휴양지모드 · 도시',
            reason: '도시, 야경, 차분한 휴식과 관련된 표현이 감지됐어요.',
            reply: '도심 라운지처럼 차분한 빛과 공기로, 편안히 쉬는 공간을 준비할게요.',
            wifeCard: '도시 휴양지처럼 세련되고 차분한 도심 라운지 분위기를 준비했어요.',
            husbandCard: '편안히 쉴 수 있도록 조명과 소음을 부드럽게 맞춰 주세요.',
            signals: ['휴양지', '도시', '라운지'],
            simulationScene: 'RESORT_SCENE',
            simulationText: '도심 라운지 화면과 은은한 빛, 안정적인 공기 흐름을 준비합니다.',
          },
        }

        function readSimulationTestModeFromStorage() {
          try {
            const raw = window.localStorage.getItem(SIMULATION_TEST_MODE_STORAGE_KEY)
            if (raw) {
              const parsed = JSON.parse(raw)
              if (parsed && parsed.routineId) return parsed
            }

            const routineId = window.localStorage.getItem(SIMULATION_ROUTINE_STORAGE_KEY)
            if (routineId && TEST_MODE_CONTENT[routineId]) {
              const content = TEST_MODE_CONTENT[routineId]
              return {
                slug: content.slug,
                hubMode: content.hubMode,
                routineId: routineId,
                travelDestination: ROUTINE_TO_DESTINATION[routineId] || null,
                modeLabel: content.modeLabel,
                source: 'hub-storage-sync',
                timestamp: Date.now(),
              }
            }

            return null
          } catch (error) {
            console.warn('[3D Simulation] test mode read failed', error)
            return null
          }
        }

        function applySimulationModeFromStorage(source) {
          const snapshot = readSimulationTestModeFromStorage()
          if (!snapshot || !snapshot.routineId || !ROUTINE_SCENES[snapshot.routineId]) {
            return false
          }

          applyRoutineBridge(snapshot.routineId, source, snapshot.timestamp)
          return true
        }

        function persistSimulationTestMode(routineId, source) {
          if (source !== 'test-button' || !TEST_MODE_CONTENT[routineId]) return

          const content = TEST_MODE_CONTENT[routineId]
          const snapshot = {
            slug: content.slug,
            hubMode: content.hubMode,
            routineId: routineId,
            travelDestination: ROUTINE_TO_DESTINATION[routineId] || null,
            modeLabel: content.modeLabel,
            reason: content.reason,
            reply: content.reply,
            wifeCard: content.wifeCard,
            husbandCard: content.husbandCard,
            signals: content.signals,
            simulationScene: content.simulationScene,
            simulationText: content.simulationText,
            source: 'test-tab',
            timestamp: Date.now(),
          }

          window.localStorage.setItem(
            SIMULATION_TEST_MODE_STORAGE_KEY,
            JSON.stringify(snapshot),
          )
          window.localStorage.setItem(SIMULATION_ROUTINE_STORAGE_KEY, routineId)
          window.localStorage.setItem(
            SIMULATION_DESTINATION_STORAGE_KEY,
            ROUTINE_TO_DESTINATION[routineId] || '',
          )
          window.dispatchEvent(
            new CustomEvent(SIMULATION_TEST_MODE_CHANGE_EVENT, { detail: snapshot }),
          )

          console.log('[3D Simulation] saved test mode for hub sync:', {
            slug: snapshot.slug,
            routineId: snapshot.routineId,
            modeLabel: snapshot.modeLabel,
          })
        }

        function applyFromBroadcast(data) {
          if (!data) return

          if (data.type === 'SIMULATION_MODE_CHANGE') {
            const routineId =
              resolveRoutineId(data.routine) ||
              resolveRoutineId(data.destination) ||
              resolveRoutineFromBroadcast({
                type: 'THINQ_MOM_MODE',
                mode: data.mode,
                routineId: data.routine,
                travelDestination: data.destination,
                timestamp: data.updatedAt,
              })

            if (
              routineId &&
              shouldApplyIncomingState(data.source || 'broadcast', data.updatedAt)
            ) {
              applyRoutineBridge(routineId, data.source || 'broadcast', data.updatedAt)
            }
            return
          }

          if (data.type !== 'THINQ_MOM_MODE') return

          if (!shouldApplyIncomingState('broadcast', data.timestamp)) return

          const routineId = resolveRoutineFromBroadcast(data)

          if (routineId) {
            applyRoutineBridge(routineId, 'broadcast', data.timestamp)
            return
          }

          const queryMode = data.simulationQueryMode
            ? normalizeQueryMode(data.simulationQueryMode)
            : normalizeQueryMode(data.mode)

          markAppliedState('broadcast', data.timestamp)
          applyThinQMomOverlay(queryMode, data.label, 'broadcast-overlay-only')
        }

        function ensureBadge() {
          let badge = document.getElementById('thinq-mom-mode-badge')
          if (!badge) {
            badge = document.createElement('div')
            badge.id = 'thinq-mom-mode-badge'
            badge.style.position = 'fixed'
            badge.style.right = '16px'
            badge.style.top = '16px'
            badge.style.zIndex = '99999'
            badge.style.padding = '10px 14px'
            badge.style.borderRadius = '999px'
            badge.style.background = 'rgba(17, 24, 39, 0.78)'
            badge.style.color = '#fff'
            badge.style.fontSize = '14px'
            badge.style.fontFamily =
              'system-ui, -apple-system, BlinkMacSystemFont, sans-serif'
            badge.style.backdropFilter = 'blur(10px)'
            badge.style.display = 'none'
            badge.textContent = ''
            document.body.appendChild(badge)
          }
          return badge
        }

        function ensureOverlay() {
          let overlay = document.getElementById('thinq-mom-scene-overlay')
          if (!overlay) {
            overlay = document.createElement('div')
            overlay.id = 'thinq-mom-scene-overlay'
            document.body.appendChild(overlay)
          }
          return overlay
        }

        function ensureCaptionMain() {
          let main = document.getElementById('thinq-mom-scene-caption-main')
          if (!main) {
            main = document.createElement('div')
            main.id = 'thinq-mom-scene-caption-main'
            document.body.appendChild(main)
          }
          return main
        }

        function ensureCaptionSub() {
          let sub = document.getElementById('thinq-mom-scene-caption-sub')
          if (!sub) {
            sub = document.createElement('div')
            sub.id = 'thinq-mom-scene-caption-sub'
            document.body.appendChild(sub)
          }
          return sub
        }

        function ensureLegacyCaptionRemoved() {
          const legacy = document.getElementById('thinq-mom-scene-caption')
          if (legacy) legacy.remove()
        }

        function ensureTestPanel() {
          const panel = document.getElementById('thinq-mom-mode-test-panel')
          if (panel) panel.remove()
          return null
        }

        window.__thinqMomApplyRoutine = applyRoutineBridge

        ensureBadge()
        ensureOverlay()
        ensureCaptionMain()
        ensureCaptionSub()
        ensureLegacyCaptionRemoved()
        ensureTestPanel()

        let bootstrapped = false

        function bootstrapFromUrl() {
          if (bootstrapped) return
          bootstrapped = true

          const params = new URLSearchParams(window.location.search)

          const routineFromUrl = resolveRoutineFromUrlParams(params)

          if (routineFromUrl) {
            urlBootstrapRoutine = routineFromUrl
            applyRoutineBridge(routineFromUrl, 'url-query')
            return
          }

          const overlayMode = normalizeQueryMode(params.get('mode'))
          if (overlayMode !== 'default') {
            const routineFromMode = MODE_QUERY_TO_ROUTINE[overlayMode]
            if (routineFromMode) {
              urlBootstrapRoutine = routineFromMode
              applyRoutineBridge(routineFromMode, 'url-query')
              return
            }

            applyThinQMomOverlay(overlayMode, MODE_SCENES[overlayMode]?.label, 'url-overlay-only')
            return
          }

          applyThinQMomOverlay('default', MODE_SCENES.default.label, 'fallback-default')
        }

        window.addEventListener('load', () => {
          bootstrapFromUrl()
        })

        if (document.readyState === 'complete') {
          bootstrapFromUrl()
        }

        window.addEventListener('message', (event) => {
          if (event.origin !== window.location.origin) return
          const data = event.data
          if (!data || data.type !== 'THINQ_MOM_3D_ROUTINE') return

          console.log('[3D Simulation] postMessage received', data)
          const routineId = resolveRoutineId(data.mode)
          if (!routineId) return
          applyRoutineBridge(routineId, 'postMessage')
        })

        try {
          const channel = new BroadcastChannel(CHANNEL_NAME)

          channel.onmessage = (event) => {
            console.log('[3D Simulation] BroadcastChannel received', event.data)
            applyFromBroadcast(event.data)
          }

          console.log('[3D Simulation] BroadcastChannel ready:', CHANNEL_NAME)
        } catch (error) {
          console.warn('[3D Simulation] BroadcastChannel unavailable', error)
        }

        window.addEventListener('storage', (event) => {
          if (
            event.key !== SIMULATION_TEST_MODE_STORAGE_KEY &&
            event.key !== SIMULATION_ROUTINE_STORAGE_KEY &&
            event.key !== SIMULATION_DESTINATION_STORAGE_KEY
          ) {
            return
          }

          console.log('[3D Simulation] storage sync from hub:', event.key)
          applySimulationModeFromStorage('hub-storage-sync')
        })

        window.addEventListener(SIMULATION_TEST_MODE_CHANGE_EVENT, (event) => {
          const detail = event.detail
          if (!detail || !detail.routineId) return
          if (!shouldApplyIncomingState('hub-custom-event', detail.timestamp)) return
          applyRoutineBridge(detail.routineId, 'hub-custom-event', detail.timestamp)
        })

        console.log('[3D Simulation] bridge ready, allowed routines:', Array.from(ROUTINE_IDS))
      })()
    </script>
  </body>
</html>
