<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Air Conditioner Demo</title>
    <script type="module" crossorigin src="./assets/index-CnB7Ca9h.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CWBYKDoy.css">
    <style>
      #thinq-mom-scene-overlay {
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 99998;
        transition: background 0.6s ease, opacity 0.6s ease;
      }

      #thinq-mom-scene-caption {
        pointer-events: none;
        position: fixed;
        left: 50%;
        bottom: 72px;
        z-index: 99999;
        transform: translateX(-50%);
        max-width: min(92vw, 520px);
        padding: 12px 18px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.72);
        color: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
      }

      #root {
        transition: filter 0.6s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      ;(() => {
        const CHANNEL_NAME = 'thinq-mom-simulation'
        const LAST_MODE_KEY = 'thinq-mom-simulation-last-mode'

        /** 3D React 앱 Jz allowlist — assets/index-CnB7Ca9h.js */
        const ROUTINE_IDS = new Set([
          'nausea_food',
          'sleep_care',
          'housework_care',
          'destination_forest',
          'destination_ocean',
          'destination_city',
        ])

        const HUB_TO_ROUTINE = {
          NAUSEA_MODE: 'nausea_food',
          SLEEP_MODE: 'sleep_care',
          HOUSEWORK_MODE: 'housework_care',
          TRAVEL_MODE: 'destination_ocean',
          nausea: 'nausea_food',
          sleep: 'sleep_care',
          housework: 'housework_care',
          homecare: 'housework_care',
          resort: 'destination_ocean',
          travel: 'destination_ocean',
          forest: 'destination_forest',
          ocean: 'destination_ocean',
          city: 'destination_city',
          nausea_food: 'nausea_food',
          sleep_care: 'sleep_care',
          housework_care: 'housework_care',
          destination_forest: 'destination_forest',
          destination_ocean: 'destination_ocean',
          destination_city: 'destination_city',
        }

        const ROUTINE_LABELS = {
          nausea_food: '입덧모드',
          sleep_care: '수면모드',
          housework_care: '가사케어 모드',
          destination_forest: '휴양지모드 (숲)',
          destination_ocean: '휴양지모드 (바다)',
          destination_city: '휴양지모드 (도시)',
        }

        const ROUTINE_TO_QUERY = {
          nausea_food: 'nausea',
          sleep_care: 'sleep',
          housework_care: 'housework',
          destination_forest: 'resort',
          destination_ocean: 'resort',
          destination_city: 'resort',
        }

        const QUERY_MODE_LABELS = {
          default: '대기 중',
          nausea: '입덧모드',
          sleep: '수면모드',
          resort: '휴양지모드',
          housework: '가사케어 모드',
          morning: '굿모닝 브리핑',
        }

        const QUERY_ALIASES = {
          default: 'default',
          nausea: 'nausea',
          sleep: 'sleep',
          resort: 'resort',
          travel: 'resort',
          housework: 'housework',
          homecare: 'housework',
          morning: 'morning',
          briefing: 'morning',
          NAUSEA_MODE: 'nausea',
          SLEEP_MODE: 'sleep',
          TRAVEL_MODE: 'resort',
          HOUSEWORK_MODE: 'housework',
          MORNING_BRIEFING: 'morning',
        }

        const MODE_SCENES = {
          default: {
            label: QUERY_MODE_LABELS.default,
            background: 'radial-gradient(circle at center, rgba(148, 163, 184, 0.18), #f8fafc 72%)',
            overlay: 'linear-gradient(180deg, rgba(255,255,255,0.08), rgba(15,23,42,0.04))',
            rootFilter: 'brightness(1) saturate(1)',
            caption: '허브에서 케어 모드를 실행하면 이 화면에 맞춰 연출됩니다.',
          },
          nausea: {
            label: QUERY_MODE_LABELS.nausea,
            background: 'radial-gradient(circle at center, rgba(125, 211, 252, 0.42), #f0f9ff 68%)',
            overlay: 'linear-gradient(180deg, rgba(186, 230, 253, 0.28), rgba(14, 165, 233, 0.08))',
            rootFilter: 'brightness(1.08) saturate(0.92) hue-rotate(-8deg)',
            caption: '시원한 공기와 공기청정기 터보 모드로 입덧 불편을 완화하는 연출',
          },
          sleep: {
            label: QUERY_MODE_LABELS.sleep,
            background: 'radial-gradient(circle at center, rgba(99, 102, 241, 0.34), #0f172a 84%)',
            overlay: 'linear-gradient(180deg, rgba(30, 27, 75, 0.42), rgba(15, 23, 42, 0.18))',
            rootFilter: 'brightness(0.72) saturate(0.85) contrast(1.05)',
            caption: '어두운 조명과 조용한 공기로 잠들기 좋은 침실 환경 연출',
          },
          resort: {
            label: QUERY_MODE_LABELS.resort,
            background: 'radial-gradient(circle at center, rgba(56, 189, 248, 0.4), #ecfeff 70%)',
            overlay: 'linear-gradient(180deg, rgba(125, 211, 252, 0.22), rgba(14, 116, 144, 0.08))',
            rootFilter: 'brightness(1.12) saturate(1.18) hue-rotate(6deg)',
            caption: '바닷가 휴양지처럼 시원하고 여유로운 공간 분위기 연출',
          },
          housework: {
            label: QUERY_MODE_LABELS.housework,
            background: 'radial-gradient(circle at center, rgba(251, 191, 36, 0.36), #fff7ed 72%)',
            overlay: 'linear-gradient(180deg, rgba(254, 243, 199, 0.28), rgba(234, 88, 12, 0.06))',
            rootFilter: 'brightness(1.04) saturate(1.05)',
            caption: '몸의 부담을 줄이는 가사케어 모드 — 공기와 온도를 부드럽게 조정',
          },
          morning: {
            label: QUERY_MODE_LABELS.morning,
            background: 'radial-gradient(circle at center, rgba(250, 204, 21, 0.38), #fffdf5 72%)',
            overlay: 'linear-gradient(180deg, rgba(254, 240, 138, 0.24), rgba(245, 158, 11, 0.08))',
            rootFilter: 'brightness(1.1) saturate(1.08) hue-rotate(4deg)',
            caption: '상쾌한 아침 브리핑 — 밝은 조명과 맑은 공기로 하루를 시작',
          },
        }

        let activeQueryMode = 'default'
        let lastDispatchedRoutine = null

        function resolveRoutineId(value) {
          if (!value) return null
          const trimmed = String(value).trim()
          const mapped = HUB_TO_ROUTINE[trimmed] || HUB_TO_ROUTINE[trimmed.toUpperCase()]
          if (mapped && ROUTINE_IDS.has(mapped)) return mapped
          if (ROUTINE_IDS.has(trimmed)) return trimmed
          return null
        }

        function normalizeQueryMode(value) {
          if (!value) return 'default'
          const trimmed = String(value).trim()
          return QUERY_ALIASES[trimmed] || QUERY_ALIASES[trimmed.toUpperCase()] || 'default'
        }

        function dispatchVoiceAgentRoutine(routineId, source) {
          if (!routineId || !ROUTINE_IDS.has(routineId)) {
            console.warn('[simulation-3d bridge] unknown routine:', routineId, source)
            return false
          }

          console.log('[simulation-3d bridge] dispatch voice-agent-routine:', routineId, source || '')

          window.dispatchEvent(
            new CustomEvent('voice-agent-routine', {
              detail: { mode: routineId },
            }),
          )

          lastDispatchedRoutine = routineId
          return true
        }

        function waitForReactRootReady(callback) {
          const root = document.getElementById('root')
          if (root && root.childElementCount > 0) {
            window.setTimeout(callback, 300)
            return
          }

          let done = false
          const finish = () => {
            if (done) return
            done = true
            observer.disconnect()
            window.clearTimeout(fallbackTimer)
            window.setTimeout(callback, 300)
          }

          const observer = new MutationObserver(() => {
            if (root && root.childElementCount > 0) finish()
          })

          if (root) observer.observe(root, { childList: true, subtree: true })

          const fallbackTimer = window.setTimeout(finish, 2500)
        }

        function scheduleRoutineDispatch(routineId, source) {
          if (!routineId) return

          waitForReactRootReady(() => {
            dispatchVoiceAgentRoutine(routineId, source)
            window.setTimeout(() => {
              dispatchVoiceAgentRoutine(routineId, source + ' (retry)')
            }, 1200)
          })
        }

        function applyThinQMomOverlay(queryMode, labelOverride, source) {
          const normalized = normalizeQueryMode(queryMode)
          const scene = MODE_SCENES[normalized] || MODE_SCENES.default
          const displayLabel = labelOverride || scene.label

          activeQueryMode = normalized

          const badge = ensureBadge()
          const overlay = ensureOverlay()
          const caption = ensureCaption()
          const root = document.getElementById('root')

          badge.textContent = '현재 모드: ' + displayLabel
          document.body.dataset.thinqMomMode = normalized
          document.body.dataset.thinqMomRoutine = lastDispatchedRoutine || ''

          document.body.style.background = scene.background
          overlay.style.background = scene.overlay
          caption.textContent = scene.caption

          if (root) root.style.filter = scene.rootFilter

          console.log('[3D Simulation] overlay applied:', {
            queryMode: normalized,
            label: displayLabel,
            source: source || 'unknown',
          })
        }

        function applyRoutineBridge(routineId, label, source) {
          if (!routineId) return

          scheduleRoutineDispatch(routineId, source)
          const queryMode = ROUTINE_TO_QUERY[routineId] || 'default'
          applyThinQMomOverlay(queryMode, label || ROUTINE_LABELS[routineId], source)
        }

        function applyFromBroadcast(data) {
          if (!data || data.type !== 'THINQ_MOM_MODE') return

          const routineId =
            resolveRoutineId(data.routineId) ||
            (data.travelDestination
              ? resolveRoutineId(data.travelDestination)
              : null) ||
            resolveRoutineId(data.mode)
          const queryMode = data.simulationQueryMode
            ? normalizeQueryMode(data.simulationQueryMode)
            : normalizeQueryMode(data.mode)

          if (routineId) {
            applyRoutineBridge(routineId, data.label, 'broadcast')
          } else {
            applyThinQMomOverlay(queryMode, data.label, 'broadcast-overlay-only')
          }
        }

        function ensureBadge() {
          let badge = document.getElementById('thinq-mom-mode-badge')
          if (!badge) {
            badge = document.createElement('div')
            badge.id = 'thinq-mom-mode-badge'
            badge.style.position = 'fixed'
            badge.style.right = '16px'
            badge.style.top = '16px'
            badge.style.zIndex = '99999'
            badge.style.padding = '10px 14px'
            badge.style.borderRadius = '999px'
            badge.style.background = 'rgba(17, 24, 39, 0.78)'
            badge.style.color = '#fff'
            badge.style.fontSize = '14px'
            badge.style.fontFamily =
              'system-ui, -apple-system, BlinkMacSystemFont, sans-serif'
            badge.style.backdropFilter = 'blur(10px)'
            badge.textContent = '현재 모드: 대기 중'
            document.body.appendChild(badge)
          }
          return badge
        }

        function ensureOverlay() {
          let overlay = document.getElementById('thinq-mom-scene-overlay')
          if (!overlay) {
            overlay = document.createElement('div')
            overlay.id = 'thinq-mom-scene-overlay'
            document.body.appendChild(overlay)
          }
          return overlay
        }

        function ensureCaption() {
          let caption = document.getElementById('thinq-mom-scene-caption')
          if (!caption) {
            caption = document.createElement('div')
            caption.id = 'thinq-mom-scene-caption'
            document.body.appendChild(caption)
          }
          return caption
        }

        function ensureTestPanel() {
          let panel = document.getElementById('thinq-mom-mode-test-panel')
          if (!panel) {
            panel = document.createElement('div')
            panel.id = 'thinq-mom-mode-test-panel'
            panel.style.position = 'fixed'
            panel.style.left = '12px'
            panel.style.bottom = '12px'
            panel.style.zIndex = '99999'
            panel.style.display = 'flex'
            panel.style.flexWrap = 'wrap'
            panel.style.gap = '6px'
            panel.style.maxWidth = '240px'
            panel.style.padding = '8px'
            panel.style.borderRadius = '14px'
            panel.style.background = 'rgba(255, 255, 255, 0.88)'
            panel.style.border = '1px solid rgba(148, 163, 184, 0.35)'
            panel.style.backdropFilter = 'blur(8px)'
            panel.style.boxShadow = '0 4px 16px rgba(15, 23, 42, 0.12)'

            const label = document.createElement('p')
            label.textContent = '테스트 (3D routine)'
            label.style.width = '100%'
            label.style.margin = '0 0 2px 0'
            label.style.fontSize = '10px'
            label.style.color = '#64748b'
            label.style.fontFamily =
              'system-ui, -apple-system, BlinkMacSystemFont, sans-serif'
            panel.appendChild(label)

            ;[
              ['nausea_food', '입덧'],
              ['sleep_care', '수면'],
              ['destination_ocean', '바다'],
              ['destination_forest', '숲'],
              ['destination_city', '도시'],
              ['housework_care', '가사'],
            ].forEach(([routineId, shortLabel]) => {
              const button = document.createElement('button')
              button.type = 'button'
              button.textContent = shortLabel
              button.style.minHeight = '32px'
              button.style.padding = '6px 10px'
              button.style.borderRadius = '999px'
              button.style.border = '1px solid #cbd5e1'
              button.style.background = '#fff'
              button.style.fontSize = '11px'
              button.style.color = '#334155'
              button.style.cursor = 'pointer'
              button.addEventListener('click', () => {
                applyRoutineBridge(routineId, ROUTINE_LABELS[routineId], 'test-button')
              })
              panel.appendChild(button)
            })

            document.body.appendChild(panel)
          }
          return panel
        }

        window.__thinqMomApplyRoutine = applyRoutineBridge

        ensureBadge()
        ensureOverlay()
        ensureCaption()
        ensureTestPanel()

        let bootstrapped = false

        function bootstrapFromUrl() {
          if (bootstrapped) return
          bootstrapped = true

          const params = new URLSearchParams(window.location.search)
          const routineFromUrl = resolveRoutineId(params.get('routine') || params.get('mode'))

          if (routineFromUrl) {
            applyRoutineBridge(routineFromUrl, ROUTINE_LABELS[routineFromUrl], 'url-query')
            return
          }

          const overlayMode = normalizeQueryMode(params.get('mode'))
          if (overlayMode !== 'default') {
            applyThinQMomOverlay(overlayMode, MODE_SCENES[overlayMode].label, 'url-overlay-only')
            return
          }

          try {
            const lastModeRaw = window.localStorage.getItem(LAST_MODE_KEY)
            if (lastModeRaw) {
              const lastMode = JSON.parse(lastModeRaw)
              if (lastMode && lastMode.type === 'THINQ_MOM_MODE') {
                applyFromBroadcast(lastMode)
                return
              }
            }
          } catch (error) {
            console.warn('[3D Simulation] last mode restore failed', error)
          }

          applyThinQMomOverlay('default', MODE_SCENES.default.label, 'fallback-default')
        }

        window.addEventListener('load', () => {
          bootstrapFromUrl()
        })

        if (document.readyState === 'complete') {
          bootstrapFromUrl()
        }

        window.addEventListener('message', (event) => {
          if (event.origin !== window.location.origin) return
          const data = event.data
          if (!data || data.type !== 'THINQ_MOM_3D_ROUTINE') return

          console.log('[3D Simulation] postMessage received', data)
          applyRoutineBridge(resolveRoutineId(data.mode), null, 'postMessage')
        })

        try {
          const channel = new BroadcastChannel(CHANNEL_NAME)

          channel.onmessage = (event) => {
            console.log('[3D Simulation] BroadcastChannel received', event.data)
            applyFromBroadcast(event.data)
          }

          console.log('[3D Simulation] BroadcastChannel ready:', CHANNEL_NAME)
        } catch (error) {
          console.warn('[3D Simulation] BroadcastChannel unavailable', error)
        }

        console.log('[3D Simulation] bridge ready, allowed routines:', Array.from(ROUTINE_IDS))
      })()
    </script>
  </body>
</html>
